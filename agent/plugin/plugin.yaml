name: genui
version: 0.2.0
description: >
  Generative UI (GenUI) overlay — enables the agent to render interactive React
  widgets in the Hermes Desktop chat thread. v2 adds a composable block library
  (25 blocks), recursive rendering, multi-page navigation, and a template
  persistence system mirroring Hermes skills.
author: hershey
kind: standalone
provides_hooks:
  - transform_llm_output
  - pre_llm_call
provides_tools:
  - template_manage
  - template_list
  - template_view
